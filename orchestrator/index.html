<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PIM Activation Orchestrator</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="site-brand" href="https://www.align.com/" aria-label="Align home">
        <img class="site-logo" src="./align-logo.svg" alt="Align">
      </a>
    </header>

    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>PIM Activation</h1>
          <p id="accountState">Signed out</p>
        </div>
        <div class="actions">
          <button id="signInButton" type="button">Sign in</button>
          <button id="signOutButton" type="button" hidden>Sign out</button>
        </div>
      </section>

      <section class="workspace">
        <label for="promptInput">Request for AI agent</label>
        <textarea id="promptInput" rows="4">Activate my AI Reader role for 2 hours for Ticket12345.</textarea>

        <div class="actions">
          <button id="extractButton" type="button" disabled>Extract intent</button>
          <button id="activateButton" type="button" disabled>Activate PIM</button>
        </div>

        <section id="confirmationPanel" class="confirmation" hidden>
          <h2>Confirm activation</h2>
          <p id="confirmationText"></p>
        </section>

        <div class="grid">
          <section>
            <h2>Payload</h2>
            <pre id="payloadOutput">{}</pre>
          </section>
          <section>
            <h2>AI agent's response</h2>
            <pre id="resultOutput">No request sent.</pre>
          </section>
        </div>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
