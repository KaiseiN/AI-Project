<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PIM Activation Orchestrator</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <h1>PIM Activation</h1>
          <p id="accountState">Signed out</p>
        </div>
        <div class="actions">
          <button id="signInButton" type="button">Sign in</button>
          <button id="signOutButton" type="button" hidden>Sign out</button>
        </div>
      </section>

      <section class="workspace">
        <label for="promptInput">Request</label>
        <textarea id="promptInput" rows="4">Activate my AI Reader role for 2 hours for Ticket12345.</textarea>

        <div class="actions">
          <button id="extractButton" type="button" disabled>Extract intent</button>
          <button id="activateButton" type="button" disabled>Activate PIM</button>
        </div>

        <div class="grid">
          <section>
            <h2>Payload</h2>
            <pre id="payloadOutput">{}</pre>
          </section>
          <section>
            <h2>Result</h2>
            <pre id="resultOutput">No request sent.</pre>
          </section>
        </div>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
